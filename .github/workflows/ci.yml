name: CI

# Проверка кода на пул-реквестах и пушах в любые ветки кроме main
# (main проверяется и деплоится в deploy.yml).
on:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck & build
        run: npm run build

      - name: Security audit (prod deps)
        run: npm audit --omit=dev --audit-level=high
